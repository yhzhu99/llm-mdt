<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Abstract Network Lines -->
  <g stroke="rgba(74, 144, 226, 0.2)" stroke-width="2" fill="none">
    <path d="M150 150 Q 250 80 400 150 T 650 150" />
    <path d="M150 150 Q 250 220 400 150 T 650 150" />
    <path d="M400 50 L 400 250" />
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Council Models -->
    <circle cx="150" cy="150" r="8" fill="#38bdf8" />
    <circle cx="275" cy="85" r="6" fill="#4a90e2" />
    <circle cx="275" cy="215" r="6" fill="#4a90e2" />
    <!-- Chairman -->
    <circle cx="400" cy="150" r="14" fill="url(#accent-grad)" />
    <!-- Output -->
    <circle cx="650" cy="150" r="8" fill="#22c55e" />
  </g>

  <!-- Title & Subtitle -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="400" y="235" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="2">LLM MDT</text>
    <text x="400" y="265" font-size="16" font-weight="400" fill="#94a3b8" letter-spacing="1">Multi-Agent Deliberation with Anonymized Peer Review</text>
  </g>

  <!-- Floating Tags -->
  <g font-family="monospace" font-size="12" fill="#38bdf8" text-anchor="middle" opacity="0.8">
    <rect x="110" y="110" width="80" height="24" rx="4" fill="rgba(56, 189, 248, 0.1)" stroke="#38bdf8" stroke-width="1"/>
    <text x="150" y="126">Stage 1</text>

    <rect x="360" y="100" width="80" height="24" rx="4" fill="rgba(74, 144, 226, 0.1)" stroke="#4a90e2" stroke-width="1"/>
    <text x="400" y="116">Stage 2</text>

    <rect x="610" y="110" width="80" height="24" rx="4" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="650" y="126" fill="#22c55e">Stage 3</text>
  </g>
</svg>