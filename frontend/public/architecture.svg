<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" height="100%">
  <defs>
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f1f5f9" />

  <g font-family="system-ui, -apple-system, sans-serif" font-size="14">

    <!-- User Input -->
    <rect x="300" y="20" width="200" height="40" rx="20" fill="#0f172a" filter="url(#shadow)"/>
    <text x="400" y="45" fill="#ffffff" font-weight="600" text-anchor="middle">User Query</text>

    <line x1="400" y1="60" x2="400" y2="90" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Stage 1 -->
    <rect x="50" y="90" width="700" height="90" rx="12" fill="url(#box-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="70" y="115" fill="#3b82f6" font-weight="800" font-size="16">STAGE 1: Parallel Generation</text>

    <rect x="150" y="130" width="120" height="35" rx="6" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="210" y="152" fill="#0369a1" font-weight="600" text-anchor="middle">GPT-5.2</text>

    <rect x="340" y="130" width="120" height="35" rx="6" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="400" y="152" fill="#0369a1" font-weight="600" text-anchor="middle">Gemini-3 Pro</text>

    <rect x="530" y="130" width="120" height="35" rx="6" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="590" y="152" fill="#0369a1" font-weight="600" text-anchor="middle">DeepSeek-V3.2</text>

    <!-- Arrow down -->
    <line x1="400" y1="180" x2="400" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4"/>
    <rect x="320" y="185" width="160" height="20" rx="10" fill="#fef08a"/>
    <text x="400" y="199" fill="#854d0e" font-size="12" font-weight="700" text-anchor="middle">Anonymization (A, B, C)</text>

    <!-- Stage 2 -->
    <rect x="50" y="220" width="700" height="90" rx="12" fill="url(#box-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="70" y="245" fill="#8b5cf6" font-weight="800" font-size="16">STAGE 2: Anonymous Peer Review &amp; Ranking</text>

    <rect x="150" y="260" width="120" height="35" rx="6" fill="#ede9fe" stroke="#a78bfa"/>
    <text x="210" y="282" fill="#5b21b6" font-weight="600" text-anchor="middle">Reviewer 1</text>

    <rect x="340" y="260" width="120" height="35" rx="6" fill="#ede9fe" stroke="#a78bfa"/>
    <text x="400" y="282" fill="#5b21b6" font-weight="600" text-anchor="middle">Reviewer 2</text>

    <rect x="530" y="260" width="120" height="35" rx="6" fill="#ede9fe" stroke="#a78bfa"/>
    <text x="590" y="282" fill="#5b21b6" font-weight="600" text-anchor="middle">Reviewer 3</text>

    <!-- Arrow down -->
    <line x1="400" y1="310" x2="400" y2="340" stroke="#94a3b8" stroke-width="2"/>

    <!-- Stage 3 -->
    <rect x="50" y="340" width="700" height="90" rx="12" fill="url(#box-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="70" y="365" fill="#10b981" font-weight="800" font-size="16">STAGE 3: Chairman Synthesis</text>

    <rect x="250" y="380" width="300" height="35" rx="6" fill="#d1fae5" stroke="#34d399"/>
    <text x="400" y="402" fill="#065f46" font-weight="700" text-anchor="middle">Chairman Model (Synthesizes 1 &amp; 2)</text>
  </g>
</svg>